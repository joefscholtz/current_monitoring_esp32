name: Project CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME must be lowercase for GHCR
  IMAGE_NAME: ${{ github.repository }}-ci

jobs:
  # Job 1: Build/Update the CI Environment
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Normalize image name to lowercase
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Run all checks inside the container
  run-ci:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetches all history for all branches and tags

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check Formatting
        run: |
          just format
          git diff --exit-code || (echo "Error: Code not formatted. Run 'just format' locally." && exit 1)

      - name: Static Analysis
        run: just lint

      - name: Unit Tests
        run: just test

      - name: Build Firmware
        run: just build
