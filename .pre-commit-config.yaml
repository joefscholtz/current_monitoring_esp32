default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit, pre-push]
      - id: end-of-file-fixer
        stages: [pre-commit, pre-push]
        always_run: false

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(json|yaml|yml)$
        stages: [pre-commit, pre-push]
        always_run: false

  - repo: local
    hooks:
      - id: docker-check
        name: Dockerized QA
        entry: docker-compose run --rm current_monitoring_esp32-app bash -c "just format && just test"
        # entry: echo "Nothing being done" || true
        language: system
        pass_filenames: false
        stages: [pre-push]
